<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query 12 - Staff Positions Count</title><link rel="stylesheet" href="../css/style.css"></head>
<body><div class="container">
<a href="../index.html" class="back-btn">← Back to Dashboard</a>
<div class="report-container">
<h1 class="report-title">Query 12: Staff Positions with Count</h1>
<div id="loading" class="loading"><div class="loading-spinner"></div><p>Loading data...</p></div>
<div id="results"></div>
</div>
<footer class="footer"><p>&copy; 2025 IVOR Paine Memorial Hospital</p></footer>
</div>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    showLoading();
    fetch('../api/query12.php').then(r=>r.json()).then(data=>{
        hideLoading();
        if(data.error){showError(data.error,'results');return;}
        let html='<button class="btn export-btn" data-table="t12" data-filename="staff_positions_count">Export CSV</button>';
        html+='<table id="t12"><thead><tr><th>Staff Type</th><th>Position</th><th>Count</th></tr></thead><tbody>';
        data.forEach(r=>{html+=`<tr><td>${r.staff_type}</td><td>${r.position}</td><td>${r.staff_count}</td></tr>`;});
        html+='</tbody></table>';
        document.getElementById('results').innerHTML=html;
    }).catch(e=>{hideLoading();showError(e.message,'results');});
});
</script></body></html>
