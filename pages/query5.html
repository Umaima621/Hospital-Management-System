<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query 5 - Unique Specialty Consultants</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="report-page">
    <a href="../index.html" class="back-btn">← Back to Dashboard</a>
    <div class="report-container">
        <h1 class="report-title">Query 5: Consultants with a Unique Specialty</h1>
        <div id="loading" class="loading"><div class="loading-spinner"></div><p>Loading data...</p></div>
        <div id="results"></div>
    </div>
    <footer class="footer"><p>&copy; 2025 IVOR Paine Memorial Hospital</p></footer>
</div>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    showLoading();
    fetch('../api/query5.php').then(r => r.json()).then(data => {
        hideLoading();
        if (data.error) { showError(JSON.stringify(data.error), 'results'); return; }
        if (!data.length) { document.getElementById('results').innerHTML = '<p>No data found.</p>'; return; }
        let html = '<div class="table-actions"><button class="btn export-btn" data-table="t5" data-filename="unique_specialty_consultants">Export CSV</button></div>';
        html += '<table id="t5" class="data-table"><thead><tr><th>Consultant ID</th><th>Specialty</th><th>Description</th></tr></thead><tbody>';
        data.forEach(r => {
            html += `<tr><td>${r.consultant_id}</td><td>${r.specialty}</td><td>${r.specialty_description || 'N/A'}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('results').innerHTML = html;
    }).catch(e => { hideLoading(); showError(e.message, 'results'); });
});
</script>
</body>
</html>
